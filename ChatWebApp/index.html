<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>MyAI | Chat with Me</title>
        <!-- 
            Bootstrap CSS
            For adding Prebuild CSS from Bootstrap Framework FOR MOST OF THE ui
        -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

        <!-- 
            Google Fonts
            For adding custom fonts from Google Fonts
        -->

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        
        <!-- 
            Custom CSS
            For adding your own styles
        -->
        <link rel="stylesheet" href="style.css">

        
    </head>
    <body>

       
        <div class="app-container">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <button class="new-chat-btn">
                        <i class="fas fa-plus"></i> New Chat
                    </button>
                </div>
            </aside>
        </div>

        <!--
            jQUERY js
            JQuery adds more functions to vanilla Javascript making adding animiations and click handling(events) easier and more efficient. It is used by Bootstrap for some of its components to work properly.
        -->
        <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
        
        <!-- 
            Popper.js 
            Popper.js is a library used to manage poppers in web applications. A popper is an element on the screen which "pops out" from the natural flow of your application. It is used by Bootstrap for tooltips, popovers, and dropdowns.
        -->
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>

        <!--
            Bootstrap JS
            Bootstrap JS is used to add interactive components to your web application, such as modals, tooltips, and carousels.
        -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

        <!-- 
            FontAwesome ICONS JS
            FontAwesome is a popular icon library that provides a wide range of scalable vector icons that can be customized with CSS.
        -->

        <script src="https://kit.fontawesome.com/9f1002df41.js" crossorigin="anonymous"></script>

        <!-- 
            Custom JS
            For adding your own scripts and functionality to the web application
        -->
        <script src="script.js"></script>
    </body>
</html>
